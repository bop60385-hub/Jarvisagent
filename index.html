<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050816" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Jarvis" />
    <meta name="color-scheme" content="dark" />
    <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="pragma" content="no-cache" />
    <meta http-equiv="expires" content="0" />
    <title>Jarvis Voice Assistant</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <!-- Orbitron Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css?v=2" />
    <style>
      html, body {
        background: #050816 !important;
        background-color: #050816 !important;
        color: #e2e8f0 !important;
      }
    </style>
  </head>
  <body>
    <main class="app-container">
      <!-- Animated Background -->
      <div class="animated-bg">
        <div class="bg-gradient"></div>
        <div class="particles">
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
          <div class="particle"></div>
        </div>
      </div>

      <!-- Header -->
      <header class="header">
        <div class="header-content">
          <h1 class="title">JARVIS</h1>
          <div class="status-indicator">
            <span class="status-dot" id="statusDot"></span>
            <span class="status-text" id="statusText">Ready</span>
          </div>
        </div>
      </header>

      <!-- Conversation Display -->
      <section class="conversation-area">
        <div class="messages-container" id="messagesContainer">
          <div class="message system-message">
            <div class="message-content">Good morning, Benny. Jarvis online.</div>
            <div class="message-time">Now</div>
          </div>
        </div>
      </section>

      <!-- Voice Control Center -->
      <section class="voice-control">
        <!-- Status Display -->
        <div class="status-display">
          <div class="status-line" id="statusLine">Ready for voice input</div>
        </div>

        <!-- Listening Indicator -->
        <div class="listening-indicator" id="listeningIndicator">
          <div class="waveform">
            <span class="wave"></span>
            <span class="wave"></span>
            <span class="wave"></span>
            <span class="wave"></span>
            <span class="wave"></span>
          </div>
          <p id="listeningText">Listening...</p>
        </div>

        <!-- Microphone Button -->
        <div class="mic-container">
          <button class="mic-button" id="micButton" aria-label="Start voice input">
            <svg class="mic-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
              <path d="M17 16.91c-1.48 1.46-3.51 2.36-5.77 2.36-2.26 0-4.29-.9-5.77-2.36l-1.1 1.1c1.86 1.86 4.41 3.02 7.07 3.02s5.21-1.16 7.07-3.02l-1.1-1.1zM12 20c2.21 0 4.2-.9 5.64-2.35l1.42 1.4c-1.83 1.83-4.35 2.96-7.06 2.96s-5.23-1.13-7.07-2.98l1.41-1.41C7.79 19.1 9.79 20 12 20z"/>
            </svg>
          </button>
          <div class="mic-label">Tap to speak</div>
          <div class="pulse-ring"></div>
        </div>

        <!-- Transcript Display -->
        <div class="transcript-box" id="transcriptBox">
          <p id="transcriptText"></p>
        </div>

        <!-- Fallback Text Input -->
        <div class="text-input-group">
          <input
            type="text"
            id="textInput"
            class="text-input"
            placeholder="Or type your question..."
            aria-label="Text input for questions"
          />
          <button class="send-button" id="sendButton" aria-label="Send message">
            <svg viewBox="0 0 24 24" fill="currentColor">
              <path d="M16.6915026,12.4744748 L3.50612381,13.2599618 C3.19218622,13.2599618 3.03521743,13.4170592 3.03521743,13.5741566 L1.15159189,20.0151496 C0.8376543,20.8006365 0.99,21.89 1.77946707,22.52 C2.41,22.99 3.50612381,23.1 4.13399899,22.8429026 L21.714504,14.0454487 C22.6563168,13.5741566 23.1272231,12.6315722 22.9702544,11.6889879 C22.9702544,11.6889879 22.3423792,7.26490555 21.714504,4.13399899 C21.3905664,2.40606788 20.3948485,1.77946707 19.3991306,1.77946707 C18.8282243,1.77946707 18.2573181,2.09095272 17.9333805,2.40606788 L2.40606788,11.3442662 C1.77946707,11.6889879 1.77946707,12.4744748 2.40606788,12.8191965 L17.9333805,21.7746749 C18.2573181,22.0897906 18.8282243,22.40130621 19.3991306,22.40130621 C20.4948485,22.40130621 21.3905664,21.7746749 21.714504,20.0467553 C22.3423792,16.9158487 22.9702544,12.4744748 22.9702544,12.4744748 C23.1272231,11.3442662 22.6563168,10.4016819 21.714504,9.93039057 Z"/>
            </svg>
          </button>
        </div>
      </section>

      <!-- Info Footer -->
      <footer class="footer">
        <p class="footer-text">Powered by Web Speech API • iPhone PWA Ready</p>
      </footer>
    </main>

    <script src="/app.js?v=2"></script>
  </body>
</html>
